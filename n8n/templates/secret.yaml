{{- include "n8n.validate" . -}}
{{- $needsKey := and (not .Values.n8n.existingSecret) .Values.n8n.encryptionKey -}}
{{- $needsAuth := and .Values.n8n.auth.enabled .Values.n8n.auth.password -}}
{{- if or $needsKey $needsAuth }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.secretName" . }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $needsKey }}
  N8N_ENCRYPTION_KEY: {{ .Values.n8n.encryptionKey | quote }}
  {{- end }}
  {{- if $needsAuth }}
  N8N_BASIC_AUTH_PASSWORD: {{ .Values.n8n.auth.password | quote }}
  {{- end }}
{{- end }}

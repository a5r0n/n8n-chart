apiVersion: v2
name: n8n
description: A Helm chart for n8n.io

dependencies:
  # PostgreSQL: CloudPirates' OSS chart (drop-in replacement for the deleted
  # Bitnami catalog). Aliased to "postgresql" so existing postgresql.* values
  # keep working. Disable with postgresql.enabled=false to use an external DB.
  - name: postgres
    alias: postgresql
    version: "0.19.5"
    repository: "oci://registry-1.docker.io/cloudpirates"
    condition: postgresql.enabled

  # Valkey: the official valkey-io chart, replacing the Bitnami redis subchart.
  # Disable with valkey.enabled=false to use an external Valkey/Redis.
  - name: valkey
    version: "0.9.4"
    repository: "https://valkey.io/valkey-helm/"
    condition: valkey.enabled

type: application

# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 0.5.0

# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.

# renovate: image=ghcr.io/n8n-io/n8n
appVersion: "2.25.2"

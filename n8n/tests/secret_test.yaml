suite: secret
templates:
  - templates/secret.yaml
release:
  name: n8n
  namespace: default
tests:
  - it: chart-managed encryption key is stored in the Secret
    set:
      n8n.encryptionKey: testkey
    asserts:
      - isKind: { of: Secret }
      - equal: { path: "stringData.N8N_ENCRYPTION_KEY", value: "testkey" }

  - it: basic-auth password is stored in the Secret when auth is enabled
    set:
      n8n.encryptionKey: testkey
      n8n.auth.enabled: true
      n8n.auth.password: s3cret
    asserts:
      - equal: { path: "stringData.N8N_BASIC_AUTH_PASSWORD", value: "s3cret" }

  - it: no chart Secret is rendered when the key comes from an existing Secret
    set:
      n8n.existingSecret: my-n8n-secret
    asserts:
      - hasDocuments: { count: 0 }

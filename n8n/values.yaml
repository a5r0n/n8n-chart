# Default values for n8n.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of n8n worker replicas (queue execution mode only).
# Deprecated: prefer `worker.replicaCount`. Kept as a fallback for compatibility.
replicaCount: 1

image:
  repository: ghcr.io/n8n-io/n8n
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# values for N8N
n8n:
  log_level: "debug"
  timezone: ""
  webhookUrl: "http://localhost"

  # Execution topology:
  #   queue   - main + webhook + worker Deployments; requires Valkey/Redis (default).
  #   regular - single main process; no worker/webhook; Valkey/Redis not required.
  executionMode: queue

  # The encryption key protects all stored credentials. KEEP IT STABLE across
  # upgrades, or you permanently lose access to saved credentials.
  # Provide exactly one of:
  #   encryptionKey: "<value>"     -> the chart creates a Secret holding the key
  #   existingSecret: "my-secret"  -> use a Secret you created (key = existingSecretKey)
  encryptionKey: ""
  existingSecret: ""
  existingSecretKey: encryption-key

  auth:
    enabled: false
    username: "n8n"
    # Basic-auth password. Rendered into the chart-managed Secret (not the ConfigMap).
    password: "N8nPassW0r$"
  data:
    prune:
      enabled: true
      # prune old executions data after X hours
      max_age: "72"
  # Additional environment variables to add to the configmap
  extraEnvs: {}
    # CUSTOM_VAR1: "value1"
    # CUSTOM_VAR2: "value2"

# -- PostgreSQL --------------------------------------------------------------
# enabled=true  -> deploy the bundled CloudPirates PostgreSQL subchart.
# enabled=false -> use an external/managed Postgres via postgresql.external.*.
postgresql:
  enabled: true
  auth:
    username: "n8n"
    database: "n8n"
    # Convenience password for the bundled DB only. For production prefer
    # postgresql.auth.existingSecret, or an external database.
    password: "n8n"
    # Reuse an existing Secret for the bundled DB password (key: postgres-password).
    existingSecret: ""
  # image:
  #   tag: ""   # Pin a PostgreSQL major (bundled default is 18). Changing the
  #             # major on an existing data volume requires a dump/restore.

  # One-time Bitnami migration helper.
  # Set migrate: true on the upgrade FROM Bitnami to CloudPirates PostgreSQL.
  # A pre-upgrade Job copies the Bitnami data directory (data/) to the
  # CloudPirates layout (pgdata/) and fixes ownership automatically.
  # Remove or set to false after the upgrade succeeds.
  bitnami:
    migrate: false
    # Image used by the pre-upgrade Job init container to run kubectl commands.
    # Must be a public image with kubectl available.
    kubectlImage: alpine/k8s:1.30.0

  external:
    # Set host (and existingSecret) when postgresql.enabled=false.
    host: ""
    port: 5432
    database: "n8n"
    username: "n8n"
    existingSecret: ""
    existingSecretPasswordKey: postgres-password

# -- Valkey (Redis-compatible) ----------------------------------------------
# Used only in queue execution mode.
# enabled=true  -> deploy the bundled valkey-io Valkey subchart.
# enabled=false -> use an external Valkey/Redis via valkey.external.*.
valkey:
  enabled: true
  auth:
    enabled: false
  external:
    # Set host when valkey.enabled=false (queue mode).
    host: ""
    port: 6379
    database: "0"
    username: ""
    # Optional Secret holding the external Valkey/Redis password.
    existingSecret: ""
    existingSecretPasswordKey: redis-password

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Worker Deployment settings (queue mode only).
worker:
  # Number of worker replicas. Falls back to the top-level `replicaCount`.
  replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  host: n8n.local
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
